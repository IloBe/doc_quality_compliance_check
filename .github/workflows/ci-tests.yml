name: ci-tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'services/orchestrator/**'
      - 'pyproject.toml'
      - '.github/workflows/ci-tests.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'tests/**'
      - 'services/orchestrator/**'
      - 'pyproject.toml'
      - '.github/workflows/ci-tests.yml'

jobs:
  test-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install -e services/orchestrator

      - name: Run unified test suite
        env:
          PYTHONPATH: services/orchestrator/src
        run: |
          python -m pytest
